<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480" role="img"
     aria-labelledby="membrane-pore-title membrane-pore-desc" font-family="General Sans, system-ui, sans-serif">
  <title id="membrane-pore-title">Dialysis membrane pore selectivity cross-section</title>
  <desc id="membrane-pore-desc">Magnified cross-section through a semipermeable dialysis membrane wall showing round pores of a
    characteristic size punched through the fibre wall. On the blood side, molecules of different sizes approach the wall: water,
    urea, and beta-2-microglobulin pass through the pores by diffusion and convection; albumin and red blood cells are too large
    and are blocked, stopped flat against the wall. A molecular-weight legend maps each molecule to its size, clearance route, and
    whether it is cleared or retained. Citation status: IFU-pending.</desc>

  <rect x="0" y="0" width="720" height="480" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="360" y="24" font-size="14" font-weight="700" fill="#10306B" text-anchor="middle">Membrane pore selectivity</text>
  <text x="360" y="40" font-size="10" font-weight="400" fill="#55616E" text-anchor="middle">Pore size sets a molecular-weight cutoff: small &amp; middle molecules cross, albumin and cells cannot.</text>

  <!-- Honesty chip: IFU-pending — placed clear of the subtitle, own row -->
  <g>
    <rect x="596" y="10" width="114" height="20" rx="10" fill="rgba(227,154,59,0.14)" stroke="#E39A3B" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="653" y="23.5" font-size="8.5" font-weight="600" fill="#E39A3B" text-anchor="middle" letter-spacing="0.01em">MW: IFU-pending</text>
  </g>

  <!-- Side labels -->
  <text x="150" y="66" font-size="11" font-weight="700" fill="#10306B" text-anchor="middle" letter-spacing="0.03em">BLOOD SIDE</text>
  <text x="585" y="66" font-size="11" font-weight="700" fill="#10306B" text-anchor="middle" letter-spacing="0.03em">DIALYSATE SIDE</text>

  <!-- Compartment fills -->
  <rect x="40" y="74" width="270" height="242" rx="10" fill="rgba(93,138,212,0.07)"/>
  <rect x="410" y="74" width="270" height="242" rx="10" fill="rgba(108,203,62,0.06)"/>

  <!-- ============ MEMBRANE WALL: thick slab with punched pores + fibre texture + depth ============ -->
  <defs>
    <linearGradient id="wallShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E3E9EE"/>
      <stop offset="50%" stop-color="#F1F4F7"/>
      <stop offset="100%" stop-color="#E3E9EE"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5D8AD4"/>
    </marker>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10306B"/>
    </marker>
    <marker id="arrowLime" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6CCB3E"/>
    </marker>
  </defs>

  <g>
    <!-- wall slab: two parallel wall faces with a filled body between = reads as material thickness -->
    <rect x="322" y="74" width="76" height="242" fill="url(#wallShade)" stroke="none"/>
    <rect x="322" y="74" width="76" height="242" fill="none" stroke="rgba(16,48,107,0.20)" stroke-width="1.5"/>
    <line x1="322" y1="74" x2="322" y2="316" stroke="#10306B" stroke-width="2"/>
    <line x1="398" y1="74" x2="398" y2="316" stroke="#10306B" stroke-width="2"/>

    <!-- fibrous membrane texture -->
    <g stroke="rgba(16,48,107,0.09)" stroke-width="1">
      <line x1="333" y1="80" x2="333" y2="310"/>
      <line x1="345" y1="80" x2="345" y2="310"/>
      <line x1="375" y1="80" x2="375" y2="310"/>
      <line x1="387" y1="80" x2="387" y2="310"/>
    </g>

    <!-- Punched pores: each pore is a full-depth channel through the slab, drawn as a light
         tunnel (channel walls) with a darker rim at both faces, so it reads as a HOLE not a ring -->
    <g>
      <!-- Pore 1 (upper) -->
      <rect x="330" y="128" width="60" height="20" fill="#FFFFFF"/>
      <line x1="330" y1="128" x2="390" y2="128" stroke="rgba(16,48,107,0.30)" stroke-width="1"/>
      <line x1="330" y1="148" x2="390" y2="148" stroke="rgba(16,48,107,0.30)" stroke-width="1"/>
      <ellipse cx="322" cy="138" rx="6" ry="10" fill="#FFFFFF" stroke="#10306B" stroke-width="2"/>
      <ellipse cx="398" cy="138" rx="6" ry="10" fill="#FFFFFF" stroke="#10306B" stroke-width="2"/>

      <!-- Pore 2 (mid) -->
      <rect x="330" y="185" width="60" height="20" fill="#FFFFFF"/>
      <line x1="330" y1="185" x2="390" y2="185" stroke="rgba(16,48,107,0.30)" stroke-width="1"/>
      <line x1="330" y1="205" x2="390" y2="205" stroke="rgba(16,48,107,0.30)" stroke-width="1"/>
      <ellipse cx="322" cy="195" rx="6" ry="10" fill="#FFFFFF" stroke="#10306B" stroke-width="2"/>
      <ellipse cx="398" cy="195" rx="6" ry="10" fill="#FFFFFF" stroke="#10306B" stroke-width="2"/>

      <!-- Pore 3 (lower) -->
      <rect x="330" y="248" width="60" height="20" fill="#FFFFFF"/>
      <line x1="330" y1="248" x2="390" y2="248" stroke="rgba(16,48,107,0.30)" stroke-width="1"/>
      <line x1="330" y1="268" x2="390" y2="268" stroke="rgba(16,48,107,0.30)" stroke-width="1"/>
      <ellipse cx="322" cy="258" rx="6" ry="10" fill="#FFFFFF" stroke="#10306B" stroke-width="2"/>
      <ellipse cx="398" cy="258" rx="6" ry="10" fill="#FFFFFF" stroke="#10306B" stroke-width="2"/>
    </g>
  </g>

  <!-- Pore-size leader, ties geometry to pore 3 (bottom lane, clear of everything else) -->
  <line x1="398" y1="258" x2="440" y2="258" stroke="#55616E" stroke-width="1" stroke-dasharray="2 2"/>
  <g>
    <rect x="440" y="247" width="108" height="22" rx="11" fill="#FFFFFF" stroke="rgba(16,48,107,0.14)" stroke-width="1"/>
    <text x="494" y="262" font-size="9" font-weight="600" fill="#10306B" text-anchor="middle" font-variant-numeric="tabular-nums">pore &#8776; 3&#8211;5 nm</text>
  </g>

  <!-- ============ BLOOD-SIDE MOLECULES (relative sizes), positioned to feed each pore ============ -->

  <!-- Water: tiny dots, several, feeding pore 1 -->
  <g fill="#9BC0F2">
    <circle cx="66" cy="132" r="2.2"/>
    <circle cx="80" cy="124" r="2.2"/>
    <circle cx="62" cy="146" r="2.2"/>
  </g>
  <line x1="66" y1="121" x2="66" y2="111" stroke="#55616E" stroke-width="1"/>
  <text x="66" y="104" font-size="8.5" font-weight="600" fill="#10306B" text-anchor="middle">Water</text>

  <!-- Urea: small circle, feeding pore 1 -->
  <circle cx="146" cy="140" r="6" fill="#5D8AD4" stroke="#10306B" stroke-width="1"/>
  <line x1="146" y1="133" x2="146" y2="122" stroke="#55616E" stroke-width="1"/>
  <text x="146" y="116" font-size="8.5" font-weight="600" fill="#10306B" text-anchor="middle">Urea</text>

  <!-- Diffusion arrows: water + urea converge on pore 1, short straight lines (not swooping) -->
  <g stroke="#5D8AD4" stroke-width="2" stroke-linecap="round" fill="none" marker-end="url(#arrowBlue)">
    <path d="M 74 138 L 300 138"/>
    <path d="M 154 141 L 300 140"/>
  </g>
  <text x="215" y="152" font-size="8.5" font-weight="700" fill="#5D8AD4" text-anchor="middle">diffusion</text>

  <!-- beta-2-microglobulin: medium circle, feeding pore 2 via convection sweep -->
  <circle cx="150" cy="195" r="14" fill="#8FB4E4" stroke="#10306B" stroke-width="1.5"/>
  <text x="150" y="199" font-size="7.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">&#946;2M</text>
  <line x1="150" y1="181" x2="150" y2="168" stroke="#55616E" stroke-width="1"/>
  <text x="150" y="162" font-size="8.5" font-weight="600" fill="#10306B" text-anchor="middle">&#946;2-microglobulin</text>

  <path d="M 164 195 L 300 195" stroke="#10306B" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrowNavy)"/>
  <text x="232" y="211" font-size="8.5" font-weight="700" fill="#10306B" text-anchor="middle">convection sweep</text>

  <!-- Albumin: large circle, sitting flush against the wall face at pore-3 height (y=258), blocked -->
  <circle cx="270" cy="258" r="25" fill="#C4E8B4" stroke="#10306B" stroke-width="1.75"/>
  <text x="270" y="262" font-size="8.5" font-weight="700" fill="#10306B" text-anchor="middle">Albumin</text>
  <!-- blocked stop-bar right at the wall face where the sphere actually touches -->
  <line x1="297" y1="243" x2="297" y2="273" stroke="#DA4A54" stroke-width="3" stroke-linecap="round"/>
  <text x="297" y="234" font-size="8" font-weight="700" fill="#DA4A54" text-anchor="middle">blocked</text>

  <!-- Red blood cell: huge biconcave shape, drifting toward the wall well ABOVE pore 1 (its own clear lane,
       y≈95, entirely above the water/urea/pore-size chip elements), blocked at the wall face at that height. -->
  <g>
    <ellipse cx="255" cy="98" rx="32" ry="19" fill="#DA4A54" stroke="#10306B" stroke-width="1.75"/>
    <ellipse cx="255" cy="98" rx="13" ry="8.5" fill="#C43944" opacity="0.55"/>
  </g>
  <text x="255" y="128" font-size="8.5" font-weight="600" fill="#10306B" text-anchor="middle">Red blood cell</text>
  <line x1="297" y1="83" x2="297" y2="113" stroke="#DA4A54" stroke-width="3" stroke-linecap="round"/>
  <text x="297" y="76" font-size="8" font-weight="700" fill="#DA4A54" text-anchor="middle">blocked</text>

  <!-- ============ DIALYSATE-SIDE: cleared molecules arriving through each pore ============ -->
  <g fill="#9BC0F2">
    <circle cx="430" cy="136" r="2.2"/>
    <circle cx="444" cy="142" r="2.2"/>
  </g>
  <circle cx="460" cy="139" r="6" fill="#5D8AD4" stroke="#10306B" stroke-width="1"/>
  <circle cx="470" cy="195" r="14" fill="#8FB4E4" stroke="#10306B" stroke-width="1.5"/>
  <text x="470" y="199" font-size="7.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">&#946;2M</text>

  <!-- dialysate effluent flow -->
  <line x1="420" y1="295" x2="668" y2="295" stroke="#6CCB3E" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowLime)"/>
  <text x="544" y="310" font-size="9" font-weight="600" fill="#2E8E54" text-anchor="middle">Dialysate effluent &#8594; (cleared solutes carried away)</text>

  <!-- ============ MW / clearance legend — single grid, consistent column x for every row ============ -->
  <g>
    <rect x="40" y="332" width="640" height="118" rx="10" fill="#F7F9FB" stroke="rgba(16,48,107,0.08)" stroke-width="1"/>
    <text x="58" y="350" font-size="9.5" font-weight="700" fill="#10306B" letter-spacing="0.03em">MOLECULE</text>
    <text x="256" y="350" font-size="9.5" font-weight="700" fill="#10306B" letter-spacing="0.03em">MW (Da)</text>
    <text x="384" y="350" font-size="9.5" font-weight="700" fill="#10306B" letter-spacing="0.03em">ROUTE</text>
    <text x="540" y="350" font-size="9.5" font-weight="700" fill="#10306B" letter-spacing="0.03em">OUTCOME</text>
    <line x1="58" y1="358" x2="662" y2="358" stroke="rgba(16,48,107,0.10)" stroke-width="1"/>

    <!-- Row 1: Water -->
    <circle cx="63" cy="372" r="2.2" fill="#9BC0F2"/>
    <text x="75" y="375" font-size="9.5" fill="#0F141A">Water</text>
    <text x="256" y="375" font-size="9.5" fill="#0F141A" font-variant-numeric="tabular-nums">18</text>
    <text x="384" y="375" font-size="9.5" fill="#0F141A">diffusion</text>
    <text x="540" y="375" font-size="9.5" fill="#2E8E54" font-weight="700">Cleared</text>

    <!-- Row 2: Urea -->
    <circle cx="63" cy="392" r="4" fill="#5D8AD4" stroke="#10306B" stroke-width="0.75"/>
    <text x="75" y="395" font-size="9.5" fill="#0F141A">Urea</text>
    <text x="256" y="395" font-size="9.5" fill="#0F141A" font-variant-numeric="tabular-nums">60</text>
    <text x="384" y="395" font-size="9.5" fill="#0F141A">diffusion</text>
    <text x="540" y="395" font-size="9.5" fill="#2E8E54" font-weight="700">Cleared</text>

    <!-- Row 3: beta-2-microglobulin -->
    <circle cx="65" cy="413" r="7" fill="#8FB4E4" stroke="#10306B" stroke-width="0.75"/>
    <text x="80" y="416" font-size="9.5" fill="#0F141A">&#946;2-microglobulin</text>
    <text x="256" y="416" font-size="9.5" fill="#0F141A" font-variant-numeric="tabular-nums">11,800</text>
    <text x="384" y="416" font-size="9.5" fill="#0F141A">convection</text>
    <text x="540" y="416" font-size="9.5" fill="#2E8E54" font-weight="700">Cleared (HDF)</text>

    <!-- Row 4: Albumin -->
    <circle cx="66" cy="434" r="9" fill="#C4E8B4" stroke="#10306B" stroke-width="0.75"/>
    <text x="82" y="437" font-size="9.5" fill="#0F141A">Albumin</text>
    <text x="256" y="437" font-size="9.5" fill="#0F141A" font-variant-numeric="tabular-nums">66,500</text>
    <text x="384" y="437" font-size="9.5" fill="#0F141A">blocked at wall</text>
    <text x="540" y="437" font-size="9.5" fill="#DA4A54" font-weight="700">Retained</text>

    <!-- Row 5: RBC -->
    <ellipse cx="65" cy="455" rx="10" ry="6" fill="#DA4A54" stroke="#10306B" stroke-width="0.75"/>
    <text x="82" y="458" font-size="9.5" fill="#0F141A">Red blood cell</text>
    <text x="256" y="458" font-size="9.5" fill="#0F141A">n/a (cellular)</text>
    <text x="384" y="458" font-size="9.5" fill="#0F141A">blocked at wall</text>
    <text x="540" y="458" font-size="9.5" fill="#DA4A54" font-weight="700">Retained</text>
  </g>
</svg>
